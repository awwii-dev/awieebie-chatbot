<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AwieebieAi – Premium Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&family=Poppins:wght@400;500;600&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="pink"] {
      --bg: #fff0f3; --sidebar-bg: #ffccd5; --card: #ffffff;
      --border: #ffb3c1; --accent: #ffb3c1; --accent2: #ff85a1;
      --user-bg: #ffe5ec; --bot-bg: #fcd5ce;
      --text: #4a3237; --muted: #805b61; --radius: 16px;
      --code-bg: #2d1f1f; --code-text: #f8d7da;
    }
    [data-theme="lilac"] {
      --bg: #f8f0fc; --sidebar-bg: #ebd4fc; --card: #ffffff;
      --border: #dfbdfc; --accent: #dfbdfc; --accent2: #b582eb;
      --user-bg: #f3e8ff; --bot-bg: #e0e7ff;
      --text: #3c2a4d; --muted: #6d5580;
      --code-bg: #1e1b2e; --code-text: #e9d5ff;
    }
    [data-theme="mint"] {
      --bg: #f0fdf4; --sidebar-bg: #bbf7d0; --card: #ffffff;
      --border: #86efac; --accent: #86efac; --accent2: #4ade80;
      --user-bg: #dcfce7; --bot-bg: #ccfbf1;
      --text: #143d22; --muted: #3b6e4c;
      --code-bg: #0f2d1a; --code-text: #bbf7d0;
    }
    [data-theme="peach"] {
      --bg: #fff7ed; --sidebar-bg: #ffedd5; --card: #ffffff;
      --border: #fed7aa; --accent: #fed7aa; --accent2: #fb923c;
      --user-bg: #ffedd5; --bot-bg: #fee2e2;
      --text: #451a03; --muted: #78350f;
      --code-bg: #2d1500; --code-text: #ffedd5;
    }
    [data-theme="dark"] {
      --bg: #121214; --sidebar-bg: #1e1b24; --card: #2a2438;
      --border: #443754; --accent: #443754; --accent2: #b582eb;
      --user-bg: #2d253a; --bot-bg: #24212c;
      --text: #f3e8ff; --muted: #a78bfa;
      --code-bg: #0d0d0f; --code-text: #e2e8f0;
    }

    /* ── FONT CLASSES ── */
    .font-inter, .font-inter * { font-family: 'Inter', sans-serif; }
    .font-space, .font-space * { font-family: 'Space Grotesk', sans-serif; }
    .font-poppins, .font-poppins * { font-family: 'Poppins', sans-serif; }
    .font-comic, .font-comic * { font-family: 'Comic Neue', cursive; }

    body {
      background: var(--bg); color: var(--text);
      height: 100dvh; display: flex; overflow: hidden;
      transition: all 0.4s ease; flex-direction: row;
      font-family: 'Inter', sans-serif;
    }

    /* ── SIDEBAR (DESKTOP) ── */
    aside {
      width: 260px; background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 20px 14px; justify-content: space-between;
      flex-shrink: 0; overflow-y: auto;
      transition: transform 0.3s ease;
      z-index: 100;
    }
    .sidebar-top { display: flex; flex-direction: column; gap: 16px; }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-img { width: 40px; height: 40px; object-fit: cover; border-radius: 50%; border: 2px solid var(--border); }
    .logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; }
    .logo-sub { font-size: 0.7rem; color: var(--muted); opacity: 0.8; }
    .status-dot {
      width: 8px; height: 8px; background: #4ade80; border-radius: 50%;
      animation: pulse 2s infinite; display: inline-block; margin-left: 4px; vertical-align: middle;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(74,222,128,.4); }
      70%  { box-shadow: 0 0 0 6px rgba(74,222,128,0); }
      100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
    }

    .btn-new-chat {
      width: 100%; padding: 11px; background: var(--accent2); color: #fff;
      border: none; border-radius: 12px; font-weight: 600; font-size: 0.88rem;
      cursor: pointer; transition: all 0.2s ease; text-align: center;
    }
    .btn-new-chat:hover { opacity: 0.9; transform: translateY(-1px); }

    .history-container {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 180px; overflow-y: auto; padding-right: 4px;
    }
    .history-container::-webkit-scrollbar { width: 4px; }
    .history-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 12px; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; gap: 8px;
    }
    .history-item:hover, .history-item.active { border-color: var(--accent2); background: var(--user-bg); }
    .history-item .chat-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-weight: 500; }
    .history-item .btn-del-session {
      background: transparent; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.85rem; padding: 2px 4px; opacity: 0.3; transition: all 0.2s;
    }
    .history-item:hover .btn-del-session { opacity: 1; }
    .history-item .btn-del-session:hover { color: #e11d48; }

    .menu-group { display: flex; flex-direction: column; gap: 8px; }
    .menu-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 600; padding-left: 4px; }

    #select-theme, #select-mode, #select-font, #input-cari, .btn-side {
      width: 100%; padding: 10px 14px; background: var(--card); border: 1px solid var(--border);
      color: var(--text); border-radius: 12px; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; outline: none; transition: all .2s ease;
    }
    #input-cari { cursor: text; }
    #input-cari::placeholder { color: var(--muted); opacity: 0.6; }
    #select-theme:hover, #select-mode:hover, #select-font:hover, #input-cari:focus, .btn-side:hover {
      border-color: var(--accent2);
    }
    .btn-side.danger { background: #ffe4e6; border-color: #fecdd3; color: #e11d48; text-align: left; }
    .btn-side.danger:hover { background: #f43f5e; color: #ffffff; border-color: #f43f5e; }
    .sidebar-bottom { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }

    /* ── MAIN CHAT ── */
    main { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; min-width: 0; }

    .topbar {
      display: none; align-items: center; gap: 12px;
      padding: 12px 16px; background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .btn-toggle-sidebar {
      background: transparent; border: none; cursor: pointer;
      font-size: 1.3rem; color: var(--text); padding: 4px 6px; border-radius: 8px;
    }
    .btn-toggle-sidebar:hover { background: var(--border); }
    .topbar-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1rem; }

    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 99;
    }
    .sidebar-overlay.active { display: block; }

    #chat-box {
      flex: 1; overflow-y: auto; padding: 24px 32px;
      display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;
    }
    #chat-box::-webkit-scrollbar { width: 5px; }
    #chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .welcome { text-align: center; margin: auto; padding: 32px 16px; max-width: 520px; }
    .welcome h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; margin-bottom: 10px; font-weight: 700; }
    .welcome p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
    .chip {
      padding: 9px 15px; background: var(--card); border: 1px solid var(--border);
      border-radius: 24px; font-size: 0.82rem; cursor: pointer; transition: all .2s;
    }
    .chip:hover { border-color: var(--accent2); background: var(--bg); }

    .row { display: flex; gap: 10px; align-items: flex-end; max-width: 85%; transition: opacity 0.2s; }
    .row.user { flex-direction: row-reverse; margin-left: auto; }
    .row.bot { margin-right: auto; }
    .row.hidden { display: none !important; }

    .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .avatar.user { background: var(--user-bg); border: 1px solid var(--border); }

    .msg-container { display: flex; flex-direction: column; position: relative; min-width: 0; }
    .bubble {
      padding: 11px 16px; border-radius: var(--radius); font-size: 0.88rem;
      line-height: 1.65; word-break: break-word;
      box-shadow: 0 2px 8px rgba(0,0,0,0.01);
      min-width: 0; overflow: hidden;
    }
    .bubble.bot  { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .bubble.user { background: var(--user-bg); border: 1px solid var(--border); border-bottom-right-radius: 4px; }

    /* ── CODE BLOCK STYLING ── */
    .bubble pre {
      background: var(--code-bg);
      border-radius: 10px;
      padding: 0;
      margin: 10px 0;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      max-width: 100%;
    }
    .bubble pre code {
      display: block;
      padding: 14px 16px;
      overflow-x: auto;
      font-family: 'Courier New', Consolas, monospace !important;
      font-size: 0.82rem;
      line-height: 1.6;
      color: var(--code-text);
      white-space: pre;
      max-width: 100%;
    }
    .bubble code:not(pre code) {
      background: rgba(0,0,0,0.08);
      border-radius: 5px;
      padding: 2px 6px;
      font-family: 'Courier New', Consolas, monospace !important;
      font-size: 0.83em;
      color: var(--accent2);
      border: 1px solid var(--border);
    }
    /* Header bar di atas code block */
    .bubble pre::before {
      content: '💻 Kode';
      display: block;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.5);
      font-size: 0.72rem;
      padding: 6px 14px;
      font-family: 'Inter', sans-serif;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      letter-spacing: 0.5px;
    }
    /* Styling markdown lainnya di dalam bubble */
    .bubble p { margin-bottom: 6px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin-bottom: 3px; }
    .bubble strong { font-weight: 600; }
    .bubble em { font-style: italic; }
    .bubble h1, .bubble h2, .bubble h3 { margin: 10px 0 6px; font-family: 'Space Grotesk', sans-serif; }

    .meta-actions { display: flex; gap: 8px; opacity: 0; transition: opacity 0.2s ease; margin-top: 2px; }
    .row:hover .meta-actions { opacity: 1; }
    .btn-del-msg, .btn-copy-msg { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 0.72rem; outline: none; }
    .btn-del-msg:hover { color: #f43f5e; text-decoration: underline; }
    .btn-copy-msg:hover { color: var(--accent2); text-decoration: underline; }
    .meta { font-size: 0.7rem; color: var(--muted); margin-top: 4px; display: flex; gap: 8px; align-items: center; }
    .row.user .meta { justify-content: flex-end; flex-direction: row-reverse; }

    .skeleton-loading { display: flex; flex-direction: column; gap: 8px; width: 140px; padding: 4px 0; }
    .skeleton-bar { height: 10px; background: var(--border); border-radius: 4px; opacity: 0.4; animation: skeleton-pulse 1.5s infinite ease-in-out; }
    .skeleton-bar.short { width: 60%; }
    @keyframes skeleton-pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }

    #btn-scroll-bottom {
      position: absolute; bottom: 100px; right: 20px; width: 38px; height: 38px;
      border-radius: 50%; background: linear-gradient(135deg,var(--accent),var(--accent2));
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12); opacity: 0; pointer-events: none;
      transition: all 0.3s ease; z-index: 10;
    }
    #btn-scroll-bottom.show { opacity: 1; pointer-events: auto; }
    #btn-scroll-bottom svg { width: 18px; height: 18px; fill: #fff; }

    .input-area { padding: 12px 20px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .input-row {
      display: flex; gap: 10px; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px;
    }
    #input-pesan { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 0.92rem; resize: none; max-height: 120px; line-height: 1.5; }
    #btn-kirim {
      align-self: flex-end; width: 36px; height: 36px;
      background: linear-gradient(135deg,var(--accent),var(--accent2)); border: none;
      border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #btn-kirim:disabled { opacity: .4; cursor: not-allowed; }
    #btn-kirim svg { width: 17px; height: 17px; fill: #fff; }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 640px) {
      body { flex-direction: column; }
      aside {
        position: fixed; top: 0; left: 0;
        height: 100dvh; width: 280px;
        transform: translateX(-100%);
        border-right: 1px solid var(--border);
        box-shadow: 4px 0 20px rgba(0,0,0,0.1);
      }
      aside.open { transform: translateX(0); }
      .topbar { display: flex; }
      main { height: 100dvh; }
      #chat-box { padding: 14px 14px; gap: 12px; }
      .row { max-width: 96%; }
      .bubble { font-size: 0.86rem; padding: 10px 14px; }
      .bubble pre code { font-size: 0.78rem; padding: 10px 12px; }
      .input-area { padding: 10px 12px 12px; }
      #btn-scroll-bottom { right: 14px; bottom: 90px; }
      .welcome { padding: 20px 12px; }
      .welcome h2 { font-size: 1.25rem; }
      .chips { gap: 8px; }
      .chip { font-size: 0.78rem; padding: 8px 12px; }
    }
  </style>
</head>
<body class="font-inter">

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="tutupSidebar()"></div>

  <aside id="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <img src="{{ url_for('static', filename='logo.jpeg') }}" class="logo-img" alt="Logo">
        <div>
          <div class="logo-text">AwieebieAi <div class="status-dot"></div></div>
          <div class="logo-sub">໒꒰ྀི๑ᵔ ᵕ ᵔ๑꒱ྀིა</div>
        </div>
      </div>

      <button class="btn-new-chat" id="btn-new-chat">➕ Percakapan Baru</button>

      <div class="menu-group">
        <div class="menu-label">Riwayat Obrolan</div>
        <div class="history-container" id="history-list"></div>
      </div>

      <div class="menu-group">
        <div class="menu-label">Pencarian</div>
        <input type="text" id="input-cari" placeholder="🔍 Cari pesan...">

        <div class="menu-label">Pengaturan Chat</div>
        <select id="select-mode" title="Pilih Mode">
          <option value="santai">🌸 Mode Santai</option>
          <option value="produktif">💡 Mode Produktif</option>
          <option value="pendengar">🥺 Mode Pendengar</option>
        </select>
        <select id="select-font" title="Pilih Font">
          <option value="font-inter">🔤 Font Inter</option>
          <option value="font-space">🚀 Space Grotesk</option>
          <option value="font-poppins">☁️ Font Poppins</option>
          <option value="font-comic">🎀 Comic Sans</option>
        </select>
        <select id="select-theme" title="Pilih Tema">
          <option value="pink">🌸 Soft Pink</option>
          <option value="lilac">💜 Pastel Lilac</option>
          <option value="mint">🌱 Mint Green</option>
          <option value="peach">🍑 Creamy Peach</option>
          <option value="dark">🖤 Midnight Dark</option>
        </select>
      </div>
    </div>

    <div class="sidebar-bottom">
      <button id="btn-ekspor" class="btn-side" style="text-align:left;">📥 Unduh Obrolan</button>
      <button id="btn-hapus" class="btn-side danger">🗑 Hapus Semua Sesi</button>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <button class="btn-toggle-sidebar" id="btn-toggle-sidebar" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title">AwieebieAi ✨</span>
    </div>

    <button id="btn-scroll-bottom" title="Scroll ke bawah">
      <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
    </button>

    <div id="chat-box"></div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input-pesan" placeholder="Ketik pesan..." rows="1"></textarea>
        <button id="btn-kirim" title="Kirim (Enter)">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </div>
  </main>

<script>
  const chatBox     = document.getElementById('chat-box');
  const inputEl     = document.getElementById('input-pesan');
  const btnKirim    = document.getElementById('btn-kirim');
  const btnHapus    = document.getElementById('btn-hapus');
  const btnEkspor   = document.getElementById('btn-ekspor');
  const inputCari   = document.getElementById('input-cari');
  const btnScroll   = document.getElementById('btn-scroll-bottom');
  const selectTheme = document.getElementById('select-theme');
  const selectMode  = document.getElementById('select-mode');
  const selectFont  = document.getElementById('select-font');
  const btnNewChat  = document.getElementById('btn-new-chat');
  const historyList = document.getElementById('history-list');
  const sidebar     = document.getElementById('sidebar');
  const overlay     = document.getElementById('sidebar-overlay');

  let loading = false;
  let semuaSesiChat = {};
  let idSesiAktif = "";

  function toggleSidebar() {
    const isOpen = sidebar.classList.contains('open');
    if (isOpen) tutupSidebar(); else bukaSidebar();
  }
  function bukaSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
  function tutupSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }

  const templateWelcome = `
    <div class="welcome" id="welcome-msg">
      <div class="welcome-icon">
        <img src="${window.location.origin}/static/paw.gif" alt="Paw" style="width:100px;height:100px;object-fit:contain;margin-bottom:8px;" onerror="this.src=''">
      </div>
      <h2>Selamat datang, Kakak ✨</h2>
      <p>Ada yang bisa Awieebie bantu hari ini? Tanyakan apa saja yaaa,<br>aku siap menemani dan mendengarkan cerita Kakak... 💖🎀</p>
      <div class="chips">
        <div class="chip" onclick="isiChip(this)">💡 Jelaskan cara kerja AI</div>
        <div class="chip" onclick="isiChip(this)">📝 Bantu saya membuat essay</div>
        <div class="chip" onclick="isiChip(this)">🐍 Contoh program Python</div>
      </div>
    </div>`;

  function muatDatabaseSesi() {
    const dataDisimpan = localStorage.getItem('awieebie_multichat_db');
    if (dataDisimpan) semuaSesiChat = JSON.parse(dataDisimpan);
    idSesiAktif = localStorage.getItem('awieebie_active_session_id') || "";
    if (Object.keys(semuaSesiChat).length === 0) {
      buatSesiBaru();
    } else {
      if (!idSesiAktif || !semuaSesiChat[idSesiAktif])
        idSesiAktif = Object.keys(semuaSesiChat)[0];
      renderDaftarSidebar();
      bukaSesiChat(idSesiAktif);
    }
  }

  function buatSesiBaru() {
    const idSesi = "sesi_" + Date.now();
    semuaSesiChat[idSesi] = { judul: "Obrolan Baru ✨", html: templateWelcome, ekspor: [] };
    idSesiAktif = idSesi;
    chatBox.innerHTML = templateWelcome;
    simpanDatabaseKeBrowser();
    renderDaftarSidebar();
    bukaSesiChat(idSesiAktif);
  }

  function simpanDatabaseKeBrowser() {
    if (idSesiAktif && semuaSesiChat[idSesiAktif]) {
      const cloneBox = chatBox.cloneNode(true);
      const typingRow = cloneBox.querySelector('#typing-row');
      if (typingRow) typingRow.remove();
      semuaSesiChat[idSesiAktif].html = cloneBox.innerHTML;
    }
    localStorage.setItem('awieebie_multichat_db', JSON.stringify(semuaSesiChat));
    localStorage.setItem('awieebie_active_session_id', idSesiAktif);
  }

  function renderDaftarSidebar() {
    historyList.innerHTML = "";
    Object.keys(semuaSesiChat).reverse().forEach(idSesi => {
      const sesi = semuaSesiChat[idSesi];
      if (!sesi) return;
      const item = document.createElement('div');
      item.className = `history-item ${idSesi === idSesiAktif ? 'active' : ''}`;
      item.onclick = () => {
        if (loading) return;
        simpanDatabaseKeBrowser();
        idSesiAktif = idSesi;
        bukaSesiChat(idSesi);
        renderDaftarSidebar();
        tutupSidebar();
      };
      const titleSpan = document.createElement('span');
      titleSpan.className = 'chat-title';
      titleSpan.textContent = sesi.judul;
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-del-session';
      delBtn.innerHTML = '✕';
      delBtn.title = "Hapus percakapan ini";
      delBtn.onclick = (e) => {
        e.stopPropagation();
        if (!confirm(`Hapus obrolan "${sesi.judul}"?`)) return;
        delete semuaSesiChat[idSesi];
        if (idSesiAktif === idSesi) {
          const sisaSesi = Object.keys(semuaSesiChat);
          idSesiAktif = sisaSesi[0] || "";
        }
        if (Object.keys(semuaSesiChat).length === 0) {
          localStorage.removeItem('awieebie_multichat_db');
          buatSesiBaru();
        } else {
          localStorage.setItem('awieebie_multichat_db', JSON.stringify(semuaSesiChat));
          localStorage.setItem('awieebie_active_session_id', idSesiAktif);
          renderDaftarSidebar();
          bukaSesiChat(idSesiAktif);
        }
      };
      item.appendChild(titleSpan);
      item.appendChild(delBtn);
      historyList.appendChild(item);
    });
  }

  function bukaSesiChat(idSesi) {
    const sesi = semuaSesiChat[idSesi];
    chatBox.innerHTML = (sesi && sesi.html) ? sesi.html : templateWelcome;
    chatBox.scrollTop = chatBox.scrollHeight;
    pasangUlangListenerPesan();
  }

  function pasangUlangListenerPesan() {
    const semuaRow = chatBox.querySelectorAll('.row');
    Array.from(semuaRow).forEach((row, indeks) => {
      const btnDel = row.querySelector('.btn-del-msg');
      const btnCopy = row.querySelector('.btn-copy-msg');
      const bubble = row.querySelector('.bubble');
      if (btnDel) {
        btnDel.onclick = () => {
          if (!confirm('Hapus pesan ini dari riwayat, Kak?')) return;
          row.remove();
          if (semuaSesiChat[idSesiAktif] && semuaSesiChat[idSesiAktif].ekspor)
            semuaSesiChat[idSesiAktif].ekspor.splice(indeks, 1);
          if (chatBox.querySelectorAll('.row').length === 0) {
            chatBox.innerHTML = templateWelcome;
            if (semuaSesiChat[idSesiAktif]) {
              semuaSesiChat[idSesiAktif].judul = "Obrolan Baru ✨";
              semuaSesiChat[idSesiAktif].ekspor = [];
            }
          }
          simpanDatabaseKeBrowser();
          renderDaftarSidebar();
          pasangUlangListenerPesan();
        };
      }
      if (btnCopy && bubble) {
        const teksAsli = bubble.innerText;
        btnCopy.onclick = () => {
          navigator.clipboard.writeText(teksAsli);
          btnCopy.textContent = '✅ tersalin!';
          setTimeout(() => { btnCopy.textContent = '📋 salin'; }, 2000);
        };
      }
    });
  }

  btnNewChat.addEventListener('click', () => {
    if (loading) return;
    simpanDatabaseKeBrowser();
    buatSesiBaru();
    tutupSidebar();
  });

  selectFont.addEventListener('change', (e) => {
    document.body.classList.remove('font-inter', 'font-space', 'font-poppins', 'font-comic');
    document.body.classList.add(e.target.value);
    localStorage.setItem('awieebie_font', e.target.value);
  });

  selectTheme.addEventListener('change', (e) => {
    document.documentElement.setAttribute('data-theme', e.target.value);
    localStorage.setItem('awieebie_theme', e.target.value);
  });

  if (localStorage.getItem('awieebie_theme')) {
    const t = localStorage.getItem('awieebie_theme');
    selectTheme.value = t;
    document.documentElement.setAttribute('data-theme', t);
  }
  if (localStorage.getItem('awieebie_font')) {
    const f = localStorage.getItem('awieebie_font');
    selectFont.value = f;
    document.body.classList.remove('font-inter');
    document.body.classList.add(f);
  }

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); kirimPesan(); }
  });
  btnKirim.addEventListener('click', kirimPesan);

  function isiChip(el) {
    inputEl.value = el.textContent.replace(/^.\s/, '');
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
    inputEl.focus();
  }

  chatBox.addEventListener('scroll', () => {
    const jarak = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight;
    if (jarak > 150) btnScroll.classList.add('show');
    else btnScroll.classList.remove('show');
  });
  btnScroll.addEventListener('click', () => { chatBox.scrollTop = chatBox.scrollHeight; });

  inputCari.addEventListener('input', (e) => {
    const kw = e.target.value.toLowerCase().trim();
    chatBox.querySelectorAll('.row:not(#typing-row)').forEach(row => {
      const t = row.querySelector('.bubble').textContent.toLowerCase();
      row.classList.toggle('hidden', !t.includes(kw));
    });
  });

  btnEkspor.addEventListener('click', () => {
    const sesi = semuaSesiChat[idSesiAktif];
    if (!sesi || !sesi.ekspor || sesi.ekspor.length === 0) {
      alert('Belum ada pesan di sesi ini, Kak!');
      return;
    }
    const blob = new Blob([sesi.ekspor.join('\n\n')], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${sesi.judul.replace(/\s+/g, '_')}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  });

  function tambahBubble(teks, role, waktu = '') {
    const welcomeMsg = document.getElementById('welcome-msg');
    if (welcomeMsg) welcomeMsg.remove();
    if (semuaSesiChat[idSesiAktif]) {
      semuaSesiChat[idSesiAktif].ekspor.push(`[${waktu || 'AwieebieAi'}] ${role.toUpperCase()}: ${teks}`);
      if (role === 'user' && semuaSesiChat[idSesiAktif].judul === "Obrolan Baru ✨") {
        semuaSesiChat[idSesiAktif].judul = teks.substring(0, 22) + (teks.length > 22 ? "..." : "");
        renderDaftarSidebar();
      }
    }
    const row = document.createElement('div');
    row.className = `row ${role}`;
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    if (role === 'bot') {
      avatar.innerHTML = `<img src="${window.location.origin}/static/logo.jpeg" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.src=''">`;
    } else {
      avatar.textContent = '👤';
    }
    const wrap = document.createElement('div');
    wrap.className = 'msg-container';
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    if (role === 'bot') {
      const htmlHasil = marked.parse(teks);
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = htmlHasil;
      const teksPolos = tempDiv.innerText;
      let i = 0;
      function ketikKarakter() {
        if (i < teksPolos.length) {
          bubble.textContent += teksPolos.charAt(i++);
          chatBox.scrollTop = chatBox.scrollHeight;
          setTimeout(ketikKarakter, 12);
        } else {
          bubble.innerHTML = htmlHasil;
          simpanDatabaseKeBrowser();
          pasangUlangListenerPesan();
        }
      }
      setTimeout(ketikKarakter, 150);
    } else {
      bubble.textContent = teks;
    }
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = waktu + ' ';
    const actionContainer = document.createElement('div');
    actionContainer.className = 'meta-actions';
    const btnDel = document.createElement('button');
    btnDel.className = 'btn-del-msg';
    btnDel.textContent = '🗑 hapus';
    const btnCopy = document.createElement('button');
    btnCopy.className = 'btn-copy-msg';
    btnCopy.textContent = '📋 salin';
    actionContainer.appendChild(btnDel);
    actionContainer.appendChild(btnCopy);
    meta.appendChild(actionContainer);
    wrap.appendChild(bubble);
    wrap.appendChild(meta);
    row.appendChild(avatar);
    row.appendChild(wrap);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
    if (role === 'user') { simpanDatabaseKeBrowser(); pasangUlangListenerPesan(); }
    return bubble;
  }

  function tampilkanTyping() {
    const row = document.createElement('div');
    row.className = 'row bot'; row.id = 'typing-row';
    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.innerHTML = `<img src="${window.location.origin}/static/logo.jpeg" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.src=''">`;
    const wrap = document.createElement('div');
    wrap.className = 'msg-container';
    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';
    bubble.innerHTML = '<div class="skeleton-loading"><div class="skeleton-bar"></div><div class="skeleton-bar short"></div></div>';
    wrap.appendChild(bubble); row.appendChild(avatar); row.appendChild(wrap);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function hapusTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  async function kirimPesan() {
    const pesan = inputEl.value.trim();
    if (!pesan || loading) return;
    loading = true; btnKirim.disabled = true;
    const waktu = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    tambahBubble(pesan, 'user', waktu);
    inputEl.value = ''; inputEl.style.height = 'auto';
    tampilkanTyping();
    try {
      const res = await fetch('/kirim', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pesan, mode: selectMode.value })
      });
      const data = await res.json();
      hapusTyping();
      tambahBubble(data.balasan, 'bot', data.waktu);
    } catch {
      hapusTyping();
      tambahBubble('Gagal terhubung ke server nih, coba lagi yaa Kakak... 🥺', 'bot', '');
    }
    loading = false; btnKirim.disabled = false; inputEl.focus();
  }

  btnHapus.addEventListener('click', async () => {
    if (!confirm('Hapus seluruh daftar riwayat sesi obrolan di web ini?')) return;
    try { await fetch('/hapus', { method: 'POST' }); } catch(e){}
    localStorage.removeItem('awieebie_multichat_db');
    localStorage.removeItem('awieebie_active_session_id');
    semuaSesiChat = {}; idSesiAktif = "";
    buatSesiBaru();
  });

  document.addEventListener('DOMContentLoaded', muatDatabaseSesi);
</script>
</body>
</html>
